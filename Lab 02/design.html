<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Design</title>
    <link rel="stylesheet" href="design.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    />
  </head>
  <body>
    <!-- header -->
    <div class="header flex">
      <div class="course-title">CSE 4165 Web Programming</div>
      <div class="menu-bar flex">
        <!-- unordered list -->
        <ul type="none" class="flex">
          <li class="add-space">Blog</li>
          <li class="add-space">Doc</li>
          <li class="add-space">Pricing</li>
          <li class="add-space">LogIn</li>
        </ul>
        <button class="trial-button">Start Free Trial</button>
      </div>
    </div>

    <!-- main body -->
    <div class="main-body">
      <div class="left-main"></div>
      <div class="right-main">
        <p class="sign-in-text">Sign in to your WEB PROGRAMMING account</p>
        <a href="www.google.com" class="hyperlink-color">create one</a>

        <br />
        <button class="google-button">
          <i class="fa fa-home icon"></i> Sign in with google
        </button>
      </div>
    </div>
  </body>
</html>
